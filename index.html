<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Architect Studio Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@codesandbox/sandpack-client@2.13.0/dist/sandbox.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-activity: #333333;
            --bg-menu: #3c3c3c;
            --bg-status: #007acc;
            --accent: #007acc;
            --border: #333;
            --text-muted: #858585;
            --text-light: #cccccc;
        }

        body { margin: 0; background: var(--bg-dark); color: var(--text-light); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- TOP MENU --- */
        .menu-bar { height: 35px; background: var(--bg-menu); display: flex; align-items: center; padding: 0 10px; font-size: 12px; z-index: 1000; }
        .menu-item { padding: 0 10px; height: 100%; display: flex; align-items: center; cursor: pointer; position: relative; }
        .menu-item:hover { background: #505050; }
        .dropdown { display: none; position: absolute; top: 35px; left: 0; background: var(--bg-menu); min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid var(--border); }
        .menu-item:hover .dropdown { display: block; }
        .dropdown-item { padding: 8px 15px; display: flex; justify-content: space-between; font-size: 11px; }
        .dropdown-item:hover { background: var(--accent); color: white; }

        /* --- LAYOUT --- */
        .layout-container { display: flex; flex: 1; overflow: hidden; }

        .activity-bar { width: 50px; background: var(--bg-activity); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 25px; color: var(--text-muted); }
        .activity-bar i { font-size: 22px; cursor: pointer; }
        .activity-bar i.active { color: white; border-left: 2px solid white; padding-left: 4px; }

        .sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-title { padding: 10px 15px; font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }

        .file-item { padding: 6px 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; color: white; border-left: 2px solid var(--accent); }

        /* --- MAIN AREA --- */
        .main-editor { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .tabs { display: flex; background: #252526; height: 35px; border-bottom: 1px solid var(--bg-dark); }
        .tab { padding: 0 15px; display: flex; align-items: center; font-size: 12px; border-right: 1px solid var(--bg-dark); cursor: pointer; background: #2d2d2d; color: var(--text-muted); }
        .tab.active { background: var(--bg-dark); color: white; border-top: 1px solid var(--accent); }
        
        #editor-container { flex: 1; }

        /* --- PREVIEW PANEL --- */
        #preview-panel { width: 40%; background: white; border-left: 2px solid var(--border); display: flex; flex-direction: column; }
        .preview-header { height: 30px; background: #f3f3f3; display: flex; align-items: center; padding: 0 10px; font-size: 11px; color: #666; border-bottom: 1px solid #ccc; justify-content: space-between; }
        #sandbox-root { flex: 1; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        .status-bar { height: 22px; background: var(--bg-status); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; font-size: 11px; }
    </style>
</head>
<body>

<div class="menu-bar">
    <div class="menu-item">File
        <div class="dropdown">
            <div class="dropdown-item" onclick="location.reload()">New Window</div>
            <div class="dropdown-item" onclick="updatePreview()">Save Project <span>Ctrl+S</span></div>
        </div>
    </div>
    <div class="menu-item">Run
        <div class="dropdown">
            <div class="dropdown-item" onclick="updatePreview()" style="color:#4ec9b0">Start Debugging <span>F5</span></div>
        </div>
    </div>
    <div class="menu-item" onclick="updatePreview()" style="color: #4ec9b0; font-weight: bold; margin-left: auto; padding-right: 20px;">
        <i class="fa-solid fa-play"></i> RUN
    </div>
</div>

<div class="layout-container">
    <div class="activity-bar">
        <i class="fa-regular fa-copy active"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-bug"></i>
        <i class="fa-solid fa-gear" style="margin-top: auto; margin-bottom: 15px;"></i>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">Explorer: Architect</div>
        <div class="file-item active" id="f-index.html" onclick="switchFile('/index.html')">
            <i class="fa-solid fa-code" style="color:#e44d26"></i> index.html
        </div>
        <div class="file-item" id="f-style.css" onclick="switchFile('/style.css')">
            <i class="fa-solid fa-hashtag" style="color:#264de4"></i> style.css
        </div>
        <div class="file-item" id="f-script.js" onclick="switchFile('/script.js')">
            <i class="fa-solid fa-js" style="color:#f7df1e"></i> script.js
        </div>
    </div>

    <div class="main-editor">
        <div class="tabs">
            <div class="tab active" id="t-index.html" onclick="switchFile('/index.html')">index.html</div>
            <div class="tab" id="t-style.css" onclick="switchFile('/style.css')">style.css</div>
            <div class="tab" id="t-script.js" onclick="switchFile('/script.js')">script.js</div>
        </div>
        <div id="editor-container"></div>
    </div>

    <div id="preview-panel">
        <div class="preview-header">
            <span><i class="fa-solid fa-globe"></i> localhost:3000</span>
            <i class="fa-solid fa-rotate-right" style="cursor:pointer" onclick="updatePreview()"></i>
        </div>
        <div id="sandbox-root"></div>
    </div>
</div>

<div class="status-bar">
    <div id="engine-status"><i class="fa-solid fa-spinner fa-spin"></i> Initializing Engine...</div>
    <div id="status-right">UTF-8 | <span id="lang-label">HTML</span></div>
</div>

<script>
    let editor;
    let client;
    let activeFile = '/index.html';

    const files = {
        "/index.html": { code: `<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Architect Studio</h1>\n  <p>Environment: <span id="env">Stable</span></p>\n  <button id="btn">Click for Action</button>\n  <script src="script.js"><\/script>\n</body>\n</html>` },
        "/style.css": { code: `body { background: #1e1e1e; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 100px; }\nh1 { color: #007acc; }\nbutton { padding: 10px 20px; background: #007acc; color: white; border: none; cursor: pointer; border-radius: 4px; }` },
        "/script.js": { code: `document.getElementById('btn').onclick = () => {\n  alert('Virtual environment linked successfully!');\n};` }
    };

    // 1. Setup Monaco
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[activeFile].code,
            language: 'html',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14,
            minimap: { enabled: false }
        });

        editor.onDidChangeModelContent(() => {
            files[activeFile].code = editor.getValue();
        });

        // Start Sandpack initialization once Monaco is ready
        initSandpack(0);
    });

    // 2. Setup Sandpack with Global variable check and Retry Loop
    function initSandpack(retries) {
        const container = document.getElementById("sandbox-root");
        
        // Use window explicitly to bypass Monaco loader conflicts
        const SP = window.SandpackClient || (window.sandpack && window.sandpack.SandpackClient);

        if (SP) {
            try {
                // Initialize the client
                client = new SP.SandpackClient(container, {
                    files: files,
                    template: "static",
                });
                document.getElementById('engine-status').innerHTML = '<i class="fa-solid fa-check"></i> Engine Online';
                console.log("Sandpack Client Ready.");
            } catch (err) {
                console.error("Initialization error:", err);
                document.getElementById('engine-status').innerText = "Engine Error.";
            }
        } else if (retries < 15) {
            // Retry every 200ms for up to 3 seconds
            setTimeout(() => initSandpack(retries + 1), 200);
        } else {
            document.getElementById('engine-status').innerText = "Library Load Failed.";
        }
    }

    function switchFile(path) {
        files[activeFile].code = editor.getValue();
        activeFile = path;

        document.querySelectorAll('.tab, .file-item').forEach(el => el.classList.remove('active'));
        document.getElementById('t-' + path.substring(1)).classList.add('active');
        document.getElementById('f-' + path.substring(1)).classList.add('active');

        const ext = path.split('.').pop();
        const lang = ext === 'js' ? 'javascript' : (ext === 'css' ? 'css' : 'html');
        
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(files[activeFile].code);
        document.getElementById('lang-label').innerText = lang.toUpperCase();
    }

    async function updatePreview() {
        if (!client) {
            alert("The engine is still warming up. Please try again in a moment.");
            return;
        }
        
        files[activeFile].code = editor.getValue();
        try {
            await client.updatePreview({ files: files });
            console.log("Preview Pushed.");
        } catch (e) {
            console.error("Update failed:", e);
        }
    }

    window.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); updatePreview(); }
        if (e.key === 'F5') { e.preventDefault(); updatePreview(); }
    });
</script>
</body>
</html>
