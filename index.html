<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebCode Studio - Sandpack Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@codesandbox/sandpack-client@2.13.0/dist/sandbox.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-activity: #333333;
            --bg-menu: #3c3c3c;
            --bg-status: #007acc;
            --accent: #007acc;
            --border: #333;
            --text-muted: #858585;
            --text-light: #cccccc;
        }

        body { margin: 0; background: var(--bg-dark); color: var(--text-light); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- TOP MENU --- */
        .menu-bar { height: 35px; background: var(--bg-menu); display: flex; align-items: center; padding: 0 10px; font-size: 12px; }
        .menu-item { padding: 0 10px; height: 100%; display: flex; align-items: center; cursor: pointer; }
        .menu-item:hover { background: #505050; }

        /* --- LAYOUT --- */
        .layout-container { display: flex; flex: 1; overflow: hidden; }

        .activity-bar { width: 50px; background: var(--bg-activity); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 25px; color: var(--text-muted); }
        .activity-bar i { font-size: 22px; cursor: pointer; }
        .activity-bar i.active { color: white; border-left: 2px solid white; padding-left: 4px; }

        .sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .sidebar-title { padding: 10px 15px; font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }

        .file-item { padding: 6px 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; color: white; }

        /* --- EDITOR & PREVIEW --- */
        .main-editor { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .tabs { display: flex; background: #252526; height: 35px; }
        .tab { padding: 0 15px; display: flex; align-items: center; font-size: 12px; border-right: 1px solid var(--bg-dark); cursor: pointer; background: #2d2d2d; color: var(--text-muted); }
        .tab.active { background: var(--bg-dark); color: white; border-top: 1px solid var(--accent); }
        
        #editor-container { flex: 1; }

        /* The Preview Iframe generated by Sandpack */
        #preview-container { width: 40%; background: white; border-left: 2px solid var(--border); display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }

        .status-bar { height: 22px; background: var(--bg-status); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; font-size: 11px; }
    </style>
</head>
<body>

<div class="menu-bar">
    <div class="menu-item">File</div>
    <div class="menu-item">Edit</div>
    <div class="menu-item">Selection</div>
    <div class="menu-item">View</div>
    <div class="menu-item">Go</div>
    <div class="menu-item" onclick="updatePreview()" style="color: #4ec9b0; font-weight: bold;">▶ Run</div>
</div>

<div class="layout-container">
    <div class="activity-bar">
        <i class="fa-regular fa-copy active"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-bug"></i>
        <i class="fa-solid fa-gear" style="margin-top: auto; margin-bottom: 15px;"></i>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">Explorer: Workspace</div>
        <div class="file-item active" id="f-index.html" onclick="switchFile('/index.html')">
            <i class="fa-solid fa-code" style="color:#e44d26"></i> index.html
        </div>
        <div class="file-item" id="f-style.css" onclick="switchFile('/style.css')">
            <i class="fa-solid fa-hashtag" style="color:#264de4"></i> style.css
        </div>
        <div class="file-item" id="f-script.js" onclick="switchFile('/script.js')">
            <i class="fa-solid fa-js" style="color:#f7df1e"></i> script.js
        </div>
    </div>

    <div class="main-editor">
        <div class="tabs">
            <div class="tab active" id="t-index.html" onclick="switchFile('/index.html')">index.html</div>
            <div class="tab" id="t-style.css" onclick="switchFile('/style.css')">style.css</div>
            <div class="tab" id="t-script.js" onclick="switchFile('/script.js')">script.js</div>
        </div>
        <div id="editor-container"></div>
    </div>

    <div id="preview-container">
        <div style="height: 30px; background: #eee; display: flex; align-items: center; padding: 0 10px; font-size: 11px; color: #666; border-bottom: 1px solid #ccc;">
            <i class="fa-solid fa-rotate-right" style="margin-right: 10px; cursor: pointer;" onclick="updatePreview()"></i>
            localhost:3000
        </div>
        <div id="sandbox-root" style="flex: 1;"></div>
    </div>
</div>

<div class="status-bar">
    <div><i class="fa-solid fa-code-branch"></i> main*</div>
    <div id="status-right">UTF-8 | Monaco | <span id="lang-label">HTML</span></div>
</div>

<script>
    let editor;
    let client;
    let activeFile = '/index.html';

    // 1. Define our Initial Project Structure
    const files = {
        "/index.html": {
            code: `<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Sandpack Powered</h1>
  <p>No Blobs. Real internal bundling.</p>
  <div id="root"></div>
  <script src="script.js"><\/script>
</body>
</html>`
        },
        "/style.css": {
            code: `body { 
  background: #222; 
  color: white; 
  font-family: sans-serif; 
  text-align: center; 
  padding-top: 50px; 
}
h1 { color: #4ec9b0; }`
        },
        "/script.js": {
            code: `document.getElementById('root').innerHTML = "<b>JS is active!</b>";
console.log("Running in Sandpack virtual environment.");`
        }
    };

    // 2. Initialize Monaco and Sandpack
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
    require(['vs/editor/editor.main'], async function() {
        // Create Editor
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[activeFile].code,
            language: 'html',
            theme: 'vs-dark',
            automaticLayout: true,
            minimap: { enabled: false }
        });

        // Setup Sandpack Client
        const content = document.getElementById("sandbox-root");
        client = await Toucan.loadSandbox(content, {
            files: files,
            template: "static", // Uses a static server feel
        });

        // Update virtual files when typing
        editor.onDidChangeModelContent(() => {
            files[activeFile].code = editor.getValue();
            // Optional: Hot Reloading
            // updatePreview(); 
        });
    });

    function switchFile(path) {
        files[activeFile].code = editor.getValue();
        activeFile = path;

        // UI toggles
        document.querySelectorAll('.tab, .file-item').forEach(el => el.classList.remove('active'));
        document.getElementById('t-' + path.substring(1)).classList.add('active');
        document.getElementById('f-' + path.substring(1)).classList.add('active');

        const extension = path.split('.').pop();
        const lang = extension === 'js' ? 'javascript' : (extension === 'css' ? 'css' : 'html');
        
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(files[activeFile].code);
        document.getElementById('lang-label').innerText = lang.toUpperCase();
    }

    async function updatePreview() {
        files[activeFile].code = editor.getValue();
        // This sends the updated file object to the bundler inside the iframe
        await client.updatePreview({
            files: files
        });
    }

    // Global Shortcuts
    window.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            updatePreview();
        }
    });
</script>
</body>
</html>
